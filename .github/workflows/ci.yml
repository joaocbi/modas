# Runs on every push / PR to main branches so broken builds are caught early.
# Production deploy: keep the Vercel project connected to this GitHub repo (each push deploys).

name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build
        env:
          # Optional: add DATABASE_URL in repo Secrets if the build ever requires it
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
